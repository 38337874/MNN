name: Build MNN Chat APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install NDK
        run: yes | sdkmanager "ndk;27.2.12479018"
      - name: Build with official script
        run: |
          export ANDROID_NDK=$ANDROID_HOME/ndk/27.2.12479018
          cd apps/Android/MnnLlmChat
          chmod +x build.sh
          chmod +x ../../../project/android/build_64.sh
          ./build.sh
      - name: Fix libraries for SEP_BUILD=OFF
        run: |
          # When MNN_SEP_BUILD=OFF, only libMNN.so is generated
          # APK expects libllm.so and libMNN_Express.so separately
          # Create symlinks to libMNN.so
          cd project/android/build_64/lib
          if [ ! -f libllm.so ]; then
            ln -s libMNN.so libllm.so
          fi
          if [ ! -f libMNN_Express.so ]; then
            ln -s libMNN.so libMNN_Express.so
          fi
          ls -la
      - name: Rebuild APK
        run: |
          cd apps/Android/MnnLlmChat
          ./gradlew assembleStandardDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mnn-chat-apk
          path: apps/Android/MnnLlmChat/app/build/outputs/apk/standard/debug/*.apk