name: Build MNN Chat APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install NDK
        run: yes | sdkmanager "ndk;27.2.12479018"
      - name: Build MNN Library
        run: |
          export ANDROID_NDK=$ANDROID_HOME/ndk/27.2.12479018
          cd project/android
          mkdir -p build_64
          cd build_64
          cmake ../../../ \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_STL=c++_static \
            -DANDROID_NATIVE_API_LEVEL=android-21 \
            -DMNN_LOW_MEMORY=true \
            -DMNN_CPU_WEIGHT_DEQUANT_GEMM=true \
            -DMNN_BUILD_LLM=true \
            -DMNN_SUPPORT_TRANSFORMER_FUSE=true \
            -DMNN_ARM82=true \
            -DMNN_USE_LOGCAT=true \
            -DMNN_OPENCL=true \
            -DLLM_SUPPORT_VISION=true \
            -DLLM_SUPPORT_AUDIO=true \
            -DMNN_BUILD_AUDIO=true \
            -DMNN_BUILD_FOR_ANDROID_COMMAND=true \
            -DNATIVE_LIBRARY_OUTPUT=. \
            -DNATIVE_INCLUDE_OUTPUT=.
          make -j$(nproc)
          mkdir -p lib
          cp libMNN.so lib/
          cp libMNN_Express.so lib/
          cp libllm.so lib/
      - name: Build APK
        run: |
          cd apps/Android/MnnLlmChat
          chmod +x gradlew
          ./gradlew assembleStandardDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mnn-chat-apk
          path: apps/Android/MnnLlmChat/app/build/outputs/apk/standard/debug/*.apk
